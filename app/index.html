<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Websockets</title>
    <style>
      * {box-sizing: border-box; margin: 0; padding: 0;}

      body {
        font-family: system-ui, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #app { width: 420px; display: flex; flex-direction: column; height: 90vh; background: white; border-radius: 12px; box-shadow: 0 4px 24px rbga(0,0,0,0.1); overflow:hidden;}

      /* Join screen */
      #join-screen{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 40px;
        flex: 1;
      }

      #join-screen h1 {font-size: 22px; font-weight: 500; color: #1a1a1a;}
      #join-screen p { font-size: 14px; color: #666;}
      #username-input {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        outline: none;
        transition: border-color .2s;
      }
      #username-input:focus{border-color: #534AB7;}
      #join-btn {
        width: 100%;
        padding: 10px;
        background: #534AB7;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
        transition: background .2x;
      }
      #join-btn:hover {background: #3C3489;}

      /* Chat screen */
      #chat-screen {display: none; flex-direction: column; flex: 1; min-height: 0;}

      #header .title{ font-size: 16px; font-weight: 500; }      }
      #online-count{font-size: 13px; opacity: 0.85;}

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16p;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
    </style>
    <link rel="stylesheet" href="style.css" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <form>
      <input type="text" placeholder="Your message" />
      <button>Send</button>
    </form>
    <ul></ul>
  </body>
</html>
